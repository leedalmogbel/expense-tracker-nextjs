upstream nextjs_app {
    server app:3000;
}

# ── HTTP Server (port 80) ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name doshmate.leedalmogbel.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # UNCOMMENT AFTER OBTAINING SSL CERTIFICATE to redirect HTTP → HTTPS:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Service worker — must not be cached by intermediaries
    location = /sw.js {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web app manifest
    location = /manifest.webmanifest {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $http_host;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets — immutable, long cache
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA icons
    location ~* ^/icon-\d+x\d+\.png$ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=604800";
    }

    # Proxy to Next.js (HTTP-only mode — remove after enabling HTTPS redirect)
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

